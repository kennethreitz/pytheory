[project]
name = "pytheory"
version = "0.2.0"
description = "Music Theory for Humans"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "pytuning",
    "numeral",
    "sounddevice",
    "scipy",
]

[dependency-groups]
dev = ["pytest"]
docs = ["sphinx"]

[tool.setuptools]
packages = ["pytheory"]
